<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Project 💙🎈</title>
    <style>
        /* ==========================================================================
           🎨 1. CORE STYLE & DYNAMIC BACKGROUNDS
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #030712; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            width: 100vw; height: 100vh;
            perspective: 1000px; 
            user-select: none;
            transition: background 1.5s ease;
        }

        body.cake-top-theme {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 30%, #e8dbfc 70%, #d8f3dc 100%);
            color: #2b2d42;
        }

        /* 🎈 BALLOONS BACKGROUND */
        .balloon-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 2; overflow: hidden;
        }
        .balloon {
            position: absolute; bottom: -80px;
            width: 45px; height: 58px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: inset -5px -5px 12px rgba(0,0,0,0.08), 0 8px 20px rgba(0,0,0,0.05);
            opacity: 0.8;
            animation: floatUp 7s linear forwards;
        }
        .balloon::after {
            content: ""; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 3px solid transparent; border-right: 3px solid transparent;
            border-bottom: 6px solid var(--bg-color);
        }

        /* 🌀 3D WORMHOLE TUNNEL WARP EFFECT */
        .wormhole-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; pointer-events: none; overflow: hidden; display: none;
            perspective: 600px;
        }
        .wormhole-container.active { display: block; }
        .wormhole-line {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 120px;
            background: linear-gradient(to bottom, transparent, #00b4d8, #ffffff);
            transform-origin: center bottom;
            opacity: 0;
        }

        /* 🎬 STAGE LAYOUT */
        .stage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        .active-stage { display: flex; }

        /* 🎬 UI ELEMENTS */
        #countdownText {
            font-size: 10rem; font-weight: 900; color: #00b4d8;
            text-shadow: 0 0 40px rgba(0, 180, 216, 0.6);
            animation: bounceIn 1s infinite;
        }
        .hbd-title {
            font-size: 3.5rem; font-weight: 900; text-align: center;
            letter-spacing: 4px; color: #ffffff; text-shadow: 0 0 30px rgba(0, 180, 216, 0.5);
            line-height: 1.4;
        }
        .cyber-btn {
            margin-top: 40px; padding: 16px 45px; font-size: 1.25rem; font-weight: bold; color: #ffffff;
            background: linear-gradient(135deg, #0077b6, #00b4d8); border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 180, 216, 0.6); transition: all 0.3s ease;
        }
        .cyber-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px #00b4d8; }

        /* 🍰 CANVAS CAKE ENGINE */
        .cake-canvas-container {
            position: relative; width: 400px; height: 450px;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #cakeCanvas { width: 100%; height: 100%; }

        /* --------------------------------------------------------------------------
           📸 3. PERFECT CENTERED 360° GALLERY WITH CAPTIONS
           ========================================================================== */
        .gallery-title {
            font-size: 4rem; font-weight: 900; font-family: 'Arial Black', sans-serif;
            background: linear-gradient(to right, #0077b6, #00b4d8, #03045e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; text-align: center; opacity: 0;
            transform: translateY(-20px); transition: all 1s ease 0.5s;
            letter-spacing: 2px;
        }
        .stage.active-stage .gallery-title { opacity: 1; transform: translateY(0); }

        .gallery-viewport {
            position: relative;
            width: 100%; height: 440px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
        }

        .gallery-container {
            position: absolute;
            width: 200px; height: 290px; 
            transform-style: preserve-3d;
            transform: translateZ(-350px) rotateY(0deg); 
        }

        /* ตัวการ์ดโพลารอยด์เว้นช่องด้านล่างสำหรับใส่ชื่อไฟล์และข้อความพรีวิว */
        .gallery-card {
            position: absolute;
            width: 100%; height: 100%;
            background: #ffffff; padding: 12px 12px 12px 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 12px; transform-style: preserve-3d;
            backface-visibility: visible; cursor: pointer;
            transition: filter 0.3s, transform 0.5s ease;
            display: flex;
            flex-direction: column;
        }
        
        .img-container {
            width: 100%;
            height: 72%; /* ล็อกพิกัดสัดส่วนรูปภาพ */
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }
        .img-container img {
            width: 100%; height: 100%; object-fit: cover;
            pointer-events: none;
        }
        
        /* 📝 ส่วนกล่องข้อความใต้การ์ด */
        .card-info {
            width: 100%;
            padding-top: 8px;
            text-align: center;
            color: #334155;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
        }
        .card-filename {
            font-size: 0.85rem;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 2px;
        }
        .card-text-preview {
            font-size: 0.75rem;
            color: #64748b;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            width: 100%;
            padding: 0 4px;
        }

        .card-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0, 119, 182, 0.9); color: white;
            padding: 2px 8px; font-size: 0.7rem; font-weight: bold;
            border-radius: 20px; z-index: 10;
        }
        .gallery-card:hover {
            box-shadow: 0 0 30px rgba(0, 180, 216, 0.9);
        }

        /* ✉️ POPUP MODAL */
        .modal {
            display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(3, 7, 18, 0.7); justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(12px);
        }
        .modal-content {
            background-color: #ffffff; padding: 25px; border-radius: 24px; max-width: 460px; width: 100%; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2); border-bottom: 8px solid #3a86ff;
            animation: popOpen 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .modal-content img { width: 100%; max-height: 320px; object-fit: cover; border-radius: 14px; }
        #modalText { margin-top: 20px; font-size: 1.1rem; color: #1e293b; line-height: 1.6; text-align: left; white-space: pre-line; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 45px; font-weight: bold; cursor: pointer; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translateY(-115vh) rotate(var(--rot)); opacity: 0; }
        }
        @keyframes wormholeWarp {
            0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(0) translateZ(-600px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-300px) translateZ(400px); opacity: 0; height: 300px; }
        }
        @keyframes bounceIn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
        @keyframes popOpen { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="balloon-container" id="balloonPool"></div>
    <div class="wormhole-container" id="wormholeOverlay"></div>
    <audio id="bgMusic" src="fortoey.mp3" loop></audio>

    <!-- 🎬 ฉากที่ 1: Countdown -->
    <div class="stage active-stage" id="stage1">
        <div id="countdownText">3</div>
    </div>

    <!-- 🎬 ฉากที่ 2: หน้าเปิดงานดนตรี -->
    <div class="stage" id="stage2">
        <div class="hbd-title">HAPPY BIRTHDAY<br>TO YOU 💙</div>
        <button class="cyber-btn" id="playMusicBtn">เปิดเพลง & เข้าสู่งานปาร์ตี้ 🎵</button>
    </div>

    <!-- 🎬 ฉากที่ 3: หน้าเค้ก -->
    <div class="stage" id="stage3">
        <div class="cake-canvas-container" id="cakeContainer">
            <canvas id="cakeCanvas" width="800" height="900"></canvas>
        </div>
        <button class="cyber-btn" id="blowCakeBtn">💨 เป่าเค้กวันเกิด</button>
    </div>

    <!-- 🎬 ฉากที่ 4: แกลเลอรีวงกลม 360° -->
    <div class="stage" id="stage4">
        <h1 class="gallery-title">HAPPY BIRTHDAY</h1>
        <div class="gallery-viewport" id="galleryViewport">
            <div class="gallery-container" id="galleryContainer"></div>
        </div>
    </div>

    <!-- ✉️ หน้าต่างจดหมายลับ -->
    <div id="birthdayModal" class="modal">
        <span class="close-btn" id="closeBtn">&times;</span>
        <div class="modal-content">
            <img id="modalImg" src="" alt="Popup Pic">
            <p id="modalText"></p>
        </div>
    </div>

    <script>
        // --- 🎈 BALLOON ENGINE ---
        const balloonPool = document.getElementById('balloonPool');
        const colors = ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#a0c4ff', '#bdb2ff', '#ffc6ff'];
        
        function spawnBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            const clr = colors[Math.floor(Math.random() * colors.length)];
            const sizeWidth = Math.floor(Math.random() * 20) + 40; 
            
            balloon.style.left = Math.random() * 95 + 'vw';
            balloon.style.width = sizeWidth + 'px';
            balloon.style.height = (sizeWidth * 1.3) + 'px';
            balloon.style.backgroundColor = clr;
            balloon.style.setProperty('--bg-color', clr);
            balloon.style.setProperty('--rot', (Math.random() * 30 - 15) + 'deg');
            balloon.style.animationDuration = (Math.random() * 3 + 6) + 's';
            
            balloonPool.appendChild(balloon);
            setTimeout(() => { balloon.remove(); }, 9000);
        }
        setInterval(spawnBalloon, 450);

        // --- 🌀 3D WORMHOLE WARP ENGINE ---
        const wormholeOverlay = document.getElementById('wormholeOverlay');
        function triggerWormholeWarp(durationMs, callback) {
            wormholeOverlay.innerHTML = ''; 
            wormholeOverlay.classList.add('active');
            
            const lineCount = 60;
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.classList.add('wormhole-line');
                const angle = (360 / lineCount) * i + (Math.random() * 10);
                const animDelay = Math.random() * 0.3;
                const animDuration = 0.4 + Math.random() * 0.3;
                
                line.style.setProperty('--angle', `${angle}deg`);
                line.style.animation = `wormholeWarp ${animDuration}s cubic-bezier(0.15, 0.85, 0.35, 1) ${animDelay}s infinite`;
                wormholeOverlay.appendChild(line);
            }
            
            setTimeout(() => { if(callback) callback(); }, durationMs * 0.45);
            setTimeout(() => { wormholeOverlay.classList.remove('active'); }, durationMs);
        }

        // --- 🍰 2. CANVAS CAKE DESIGN (FIXED CANDLE STROKE) ---
        const canvas = document.getElementById('cakeCanvas');
        const ctx = canvas.getContext('2d');

        const layers = [
            { currentY: -300, targetY: 580, width: 240, height: 90, colorSide: '#005f73', colorTop: '#0a9396', delay: 0 },
            { currentY: -500, targetY: 490, width: 180, height: 80, colorSide: '#0a9396', colorTop: '#94d2bd', delay: 60 },
            { currentY: -700, targetY: 410, width: 120, height: 70, colorSide: '#94d2bd', colorTop: '#e0fbfc', delay: 120 }
        ];

        let candleY = -900; let candleTargetY = 325;
        let isFlameBurning = true; let globalTime = 0;

        function drawLayer(cx, cy, rx, ry, height, sideColor, topColor) {
            ctx.beginPath();
            ctx.ellipse(cx, cy + height, rx, ry, 0, 0, Math.PI, false);
            ctx.ellipse(cx, cy, rx, ry, 0, Math.PI, 0, true);
            ctx.closePath(); ctx.fillStyle = sideColor; ctx.fill();

            ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            ctx.fillStyle = topColor; ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
        }

        function animateCake() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            globalTime += 1; const cx = canvas.width / 2;

            if (layers[0].currentY > 0) {
                ctx.beginPath(); ctx.ellipse(cx, 670, 240, 90, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fill();
            }

            layers.forEach(layer => {
                if (globalTime > layer.delay) {
                    if (layer.currentY < layer.targetY) {
                        layer.currentY += 45; 
                        if (layer.currentY > layer.targetY) layer.currentY = layer.targetY;
                    }
                }
                drawLayer(cx, layer.currentY, layer.width, layer.width * 0.38, layer.height, layer.colorSide, layer.colorTop);
            });

            if (layers[2].currentY === layers[2].targetY) {
                if (candleY < candleTargetY) {
                    candleY += 40; if (candleY > candleTargetY) candleY = candleTargetY;
                }
                // ตัวแท่งเทียน
                ctx.fillStyle = '#ff4d6d'; ctx.fillRect(cx - 7.5, candleY, 15, 65);
                
                // ลายเส้นพันรอบเทียน (เพิ่ม ctx. สรุปฟังก์ชันวาดเส้นให้เทียนปรากฏสมบูรณ์)
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
                ctx.beginPath(); 
                ctx.moveTo(cx - 7.5, candleY + 12); ctx.lineTo(cx + 7.5, candleY + 24);
                ctx.moveTo(cx - 7.5, candleY + 34); ctx.lineTo(cx + 7.5, candleY + 46); 
                ctx.stroke();

                if (isFlameBurning && candleY === candleTargetY) {
                    ctx.beginPath(); let flicker = Math.sin(globalTime * 0.35) * 2;
                    ctx.arc(cx, candleY - 15 + flicker/2, 10.5 + flicker/2, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffb703'; ctx.shadowBlur = 30; ctx.shadowColor = '#ff9f1c';
                    ctx.fill(); ctx.shadowBlur = 0;
                }
            }
            requestAnimationFrame(animateCake);
        }

        // --- 🎬 STAGE NAVIGATION ---
        function changeStage(curr, next) {
            document.getElementById(curr).classList.remove('active-stage');
            document.getElementById(next).classList.add('active-stage');
        }

        let cnt = 3;
        const timer = setInterval(() => {
            cnt--;
            if(cnt > 0) document.getElementById('countdownText').innerText = cnt;
            else { clearInterval(timer); changeStage('stage1', 'stage2'); }
        }, 1000);

        document.getElementById('playMusicBtn').addEventListener('click', () => {
            document.getElementById('bgMusic').play().catch(e => console.log(e));
            triggerWormholeWarp(1100, () => {
                changeStage('stage2', 'stage3');
                animateCake();
            });
        });

        document.getElementById('blowCakeBtn').addEventListener('click', () => {
            isFlameBurning = false;
            document.getElementById('cakeContainer').style.opacity = '0';
            document.getElementById('cakeContainer').style.transform = 'scale(0.8)';
            document.getElementById('blowCakeBtn').style.display = 'none';

            setTimeout(() => {
                triggerWormholeWarp(1300, () => {
                    document.body.classList.add('cake-top-theme');
                    changeStage('stage3', 'stage4');
                    initCentered360Gallery();
                });
            }, 300);
        });

        // ==========================================================================
        // 📸 3. CENTERED 360° GALLERY DATA & ENGINE
        // ==========================================================================
        const photoData = [
            { img: "IMG_2009.jpg", title: "IMG_2009", msg: "Dakruan, My Happiness 💙\nอยู่เป็นเรื่องราวดีๆ และความสุขในใจกันแบบนี้ไปนานๆ เลยนะแก!" },
            { img: "IMG_2010.jpg", title: "IMG_2010", msg: "Happy Birthday จ้า! 🥳 ขอให้ปีนี้คิดอะไรก็สมหวัง การเรียนราบรื่นฉลุยเลยน้า" },
            { img: "IMG_2011.jpg", title: "IMG_2011", msg: "แฮปปี้เบิร์ธเดย์น้าแก! ขอให้โลกใบนี้ใจดีและมอบความรักให้แกเยอะๆ เลย 💫" },
            { img: "IMG_2022.jpg", title: "IMG_2022", msg: "ขอบคุณสำหรับทุกเสียงหัวเราะและช่วงเวลาดีๆ ที่ลุยมาด้วยกันนะ ยินดีด้วยกับอีกปีที่เติบโต" },
            { img: "IMG_2028.jpg", title: "IMG_2028", msg: "มีความสุขในแบบของตัวเองในทุกๆ วันนะ ยิ้มให้เยอะๆ คูลๆ แบบนี้ตลอดไป ✨" },
            { img: "IMG_2021.jpg", title: "IMG_2021", msg: "HBD แก! ขอให้เจอแต่คนใจดีๆ รอบตัว สุขภาพแข็งแรง ได้กินของอร่อยทุกวันจ้า" },
            { img: "IMG_2033.jpg", title: "IMG_2033", msg: "Happy Birthday! โตขึ้นอีกปีแล้วนะ ดีใจสุดๆ ที่ได้ฉลองวันเกิดไปพร้อมกับแกนะแก 💙" }
        ];

        function initCentered360Gallery() {
            const container = document.getElementById('galleryContainer');
            const viewport = document.getElementById('galleryViewport');
            const total = photoData.length;
            const radius = 340; 
            const angleStep = 360 / total;

            let currentRotY = 0; let targetRotY = 0;
            let isDragging = false; let startX = 0;
            let autoRotate = true; let idleTimer = null;

            for (let i = 0; i < total; i++) {
                const card = document.createElement('div');
                card.classList.add('gallery-card');
                
                const curAngle = i * angleStep;
                card.style.transform = `rotateY(${curAngle}deg) translateZ(${radius}px)`;

                // ตัวเลขกำกับมุมขวาของการ์ด
                const badge = document.createElement('div');
                badge.classList.add('card-badge');
                badge.innerText = `${i + 1}/${total}`;
                card.appendChild(badge);

                // พื้นที่ครอบรูปภาพ
                const imgContainer = document.createElement('div');
                imgContainer.classList.add('img-container');
                const img = document.createElement('img');
                img.src = photoData[i].img;
                imgContainer.appendChild(img);
                card.appendChild(imgContainer);

                // ส่วนข้อความพรีวิวใต้การ์ดรูปภาพ (สามารถคลิกอ่านตัวเต็มได้)
                const cardInfo = document.createElement('div');
                cardInfo.classList.add('card-info');
                
                const filename = document.createElement('div');
                filename.classList.add('card-filename');
                filename.innerText = photoData[i].title;
                
                const previewText = document.createElement('div');
                previewText.classList.add('card-text-preview');
                previewText.innerText = photoData[i].msg.split('\n')[0]; // ดึงบรรทัดแรกมาโชว์สั้นๆ
                
                cardInfo.appendChild(filename);
                cardInfo.appendChild(previewText);
                card.appendChild(cardInfo);

                //Event กดดูข้อความตัวเต็มและรูปขยายใหญ่ขึ้น
                card.addEventListener('click', () => {
                    document.getElementById('modalImg').src = photoData[i].img;
                    document.getElementById('modalText').innerText = photoData[i].msg;
                    document.getElementById('birthdayModal').style.display = 'flex';
                });

                container.appendChild(card);
            }

            const onStart = (e) => {
                isDragging = true; autoRotate = false;
                clearTimeout(idleTimer);
                startX = e.pageX || e.touches[0].pageX;
            };
            const onMove = (e) => {
                if (!isDragging) return;
                const x = e.pageX || e.touches[0].pageX;
                targetRotY += (x - startX) * 0.25; 
                startX = x;
            };
            const onEnd = () => {
                if (isDragging) {
                    isDragging = false;
                    idleTimer = setTimeout(() => { autoRotate = true; }, 2500); 
                }
            };

            viewport.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            viewport.addEventListener('touchstart', onStart, {passive: true});
            window.addEventListener('touchmove', onMove, {passive: true});
            window.addEventListener('touchend', onEnd);

            function galleryLoop() {
                if (autoRotate && !isDragging) targetRotY -= 0.15;
                currentRotY += (targetRotY - currentRotY) * 0.1;
                container.style.transform = `translateZ(-350px) rotateY(${currentRotY}deg) `;
                requestAnimationFrame(galleryLoop);
            }
            galleryLoop();
        }

        const modal = document.getElementById('birthdayModal');
        document.getElementById('closeBtn').addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    </script>
</body>
</html>
